<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta property="og:type" content="website">

    <title>Eid Mubarak | Cyberpunk Edition</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts: Orbitron for headers, Rajdhani for text, Share Tech Mono for code vibes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

    <style>
        /* Custom Tailwind Configuration */
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-cyan': '#00f3ff',
                        'neon-pink': '#ff003c',
                        'neon-yellow': '#fcee0a',
                        'cyber-dark': '#050505',
                        'cyber-gray': '#121212',
                    },
                    fontFamily: {
                        'cyber': ['Orbitron', 'sans-serif'],
                        'body': ['Rajdhani', 'sans-serif'],
                        'mono': ['"Share Tech Mono"', 'monospace'],
                    }
                }
            }
        }
    </style>

    <style>
        /* Cyberpunk Global Styles */
        body {
            background-color: #050505;
            color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Cyber Grid Background */
        .cyber-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        /* Neon Glow Utilities */
        .glow-cyan {
            text-shadow: 0 0 5px #00f3ff, 0 0 10px #00f3ff;
        }
        .glow-pink {
            text-shadow: 0 0 5px #ff003c, 0 0 10px #ff003c;
        }
        .glow-yellow {
            text-shadow: 0 0 5px #fcee0a, 0 0 10px #fcee0a;
        }
        
        .box-glow-cyan {
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1);
        }
        .box-glow-pink {
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.2), inset 0 0 10px rgba(255, 0, 60, 0.1);
        }

        /* Glitch Effect */
        .glitch {
            position: relative;
            color: #fff;
            font-weight: 900;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }
        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff003c;
            clip: rect(24px, 550px, 90px, 0);
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00f3ff;
            clip: rect(85px, 550px, 140px, 0);
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(70px, 9999px, 76px, 0); }
            20% { clip: rect(29px, 9999px, 16px, 0); }
            40% { clip: rect(76px, 9999px, 3px, 0); }
            60% { clip: rect(42px, 9999px, 78px, 0); }
            80% { clip: rect(15px, 9999px, 13px, 0); }
            100% { clip: rect(53px, 9999px, 5px, 0); }
        }
        @keyframes glitch-anim-2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            20% { clip: rect(3px, 9999px, 85px, 0); }
            40% { clip: rect(90px, 9999px, 5px, 0); }
            60% { clip: rect(12px, 9999px, 60px, 0); }
            80% { clip: rect(80px, 9999px, 20px, 0); }
            100% { clip: rect(40px, 9999px, 90px, 0); }
        }

        /* UI Accents */
        .cyber-border {
            position: relative;
            background: #121212;
            border: 1px solid #333;
        }
        .cyber-border::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px;
            width: 20px; height: 20px;
            border-top: 2px solid #00f3ff;
            border-left: 2px solid #00f3ff;
        }
        .cyber-border::after {
            content: '';
            position: absolute;
            bottom: -1px; right: -1px;
            width: 20px; height: 20px;
            border-bottom: 2px solid #ff003c;
            border-right: 2px solid #ff003c;
        }
        
        .cyber-border-alt::before {
            border-top: 2px solid #ff003c;
            border-left: 2px solid #ff003c;
        }
        .cyber-border-alt::after {
            border-bottom: 2px solid #00f3ff;
            border-right: 2px solid #00f3ff;
        }
        
        .cyber-border-yellow::before {
            border-top: 2px solid #fcee0a;
            border-left: 2px solid #fcee0a;
        }
        .cyber-border-yellow::after {
            border-bottom: 2px solid #fcee0a;
            border-right: 2px solid #fcee0a;
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 50;
            position: fixed;
            pointer-events: none;
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,243,255,0.1) 50%, rgba(0,0,0,0) 100%);
            opacity: 0.1;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>
<body class="font-body antialiased selection:bg-neon-pink selection:text-white pb-20">
    <div class="cyber-grid"></div>
    <div class="scanline"></div>
    <div id="root"></div>

    <script type="text/babel">

        const EidTemplate = () => {
            return (
                <div className="max-w-4xl mx-auto px-4 sm:px-6 py-12">

                    <div className="border-l-4 border-neon-cyan bg-cyber-gray/80 p-6 mb-10 relative overflow-hidden backdrop-blur-sm box-glow-cyan">
                        <div className="absolute top-0 right-0 p-2 opacity-30 font-mono text-neon-cyan text-xs">

                        <h2 className="font-mono text-neon-yellow text-sm md:text-base mb-2 tracking-[0.2em] uppercase glow-yellow">

                        <p className="font-mono text-neon-pink text-lg md:text-xl border-t border-gray-800 pt-4 glow-pink">
                            &gt; Taqabbalallahu Minna wa Minkum_
                        </p>
                    </div>

                    {/* Event Details Section */}
                    <div className="mb-16">
                        <div className="cyber-border cyber-border-alt bg-cyber-gray/90 p-6 md:p-8 relative box-glow-pink">
                            <div className="absolute top-0 right-0 bg-neon-pink text-black font-mono text-xs px-2 py-1 font-bold">
                                LOC // UPLINK
                            </div>
                            <h3 className="font-cyber text-2xl md:text-3xl text-white mb-6 tracking-widest uppercase glow-pink">
                                EID SALAH
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="bg-black/60 p-4 border border-neon-cyan/30 flex flex-col justify-center">
                                    <p className="font-mono text-neon-cyan text-sm uppercase mb-1 tracking-widest">Time</p>

                                <div className="bg-black/60 p-4 border border-neon-yellow/30 flex flex-col justify-center">

                                    <p className="text-gray-200 text-lg md:text-xl font-medium leading-relaxed">
                                        {rule}
                                    </p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Namaz ka Tariqa Section */}
                    <div className="mb-16">
                        <div className="flex items-center gap-4 mb-8">
                            <div className="h-0.5 flex-grow bg-neon-yellow/30"></div>
                            <h3 className="font-cyber text-2xl text-white tracking-widest uppercase glow-yellow flex items-center gap-3">
                                <span className="text-3xl">🕌</span> Eid ki Namaz ka Masnoon Tariqa
                            </h3>
                            <div className="h-0.5 flex-grow bg-neon-yellow/30"></div>
                        </div>

                        {/* Ibtida (Start) */}
                        <div className="cyber-border cyber-border-yellow bg-cyber-gray/90 p-6 md:p-8 mb-6">
                            <h4 className="font-cyber text-2xl text-neon-yellow mb-6 glow-yellow">1️⃣ Namaz ki Ibtida:</h4>
                            
                            <div className="space-y-6">

                                <div className="bg-black/60 p-5 border border-neon-cyan/20 rounded-sm">

                                    <span className="font-mono text-sm text-gray-500 block ml-5 mt-1">📖 (Sahih al-Bukhari: 960)</span>
                                </li>

</html>
